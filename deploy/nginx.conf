# Bookworm Web Service — Nginx 反向代理 + HTTPS
# 放置到 /etc/nginx/sites-available/bookworm-web
# ln -s /etc/nginx/sites-available/bookworm-web /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d bookworm.letcareme.com

upstream bookworm_backend {
    server 127.0.0.1:3211;
    keepalive 32;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name bookworm.letcareme.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bookworm.letcareme.com;

    ssl_certificate /etc/letsencrypt/live/bookworm.letcareme.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookworm.letcareme.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 安全头
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 请求体大小限制
    client_max_body_size 1m;

    # API + 静态文件
    location / {
        proxy_pass http://bookworm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # WebSocket 支持
    location /ws {
        proxy_pass http://bookworm_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Prometheus 指标 (仅内网)
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://bookworm_backend;
    }
}
