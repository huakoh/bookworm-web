# Bookworm Web Service — Nginx 反向代理配置
# 放置路径: /etc/nginx/conf.d/bookworm-web.conf
# 注意: 需要先备案域名 (服务器在中国大陆)

# 限流区域
limit_req_zone $binary_remote_addr zone=bw_api:10m rate=30r/m;

upstream bookworm_web {
    server 127.0.0.1:3211;
    keepalive 16;
}

server {
    listen 80;
    server_name your-domain.com;  # TODO: 替换为实际域名

    # HTTP → HTTPS 重定向
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;  # TODO: 替换为实际域名

    # SSL 证书 (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # 请求体限制
    client_max_body_size 1m;

    # 限流
    limit_req zone=bw_api burst=10 nodelay;
    limit_req_status 429;

    # API 路由
    location / {
        proxy_pass http://bookworm_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # 超时 (agent 长任务需要较长超时)
        proxy_connect_timeout 10s;
        proxy_read_timeout 180s;
        proxy_send_timeout 30s;
    }

    # SSE 流式端点 — 禁止缓冲
    location /v1/chat/stream {
        proxy_pass http://bookworm_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';

        # SSE 关键配置
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;  # 5 分钟 (长对话)

        # Cloudflare 兼容
        add_header X-Accel-Buffering no always;
    }

    # 禁止访问敏感文件
    location ~* \.(env|db|log|sqlite|sqlite3)$ {
        deny all;
        return 404;
    }

    # 健康检查 (不限流)
    location = /health {
        proxy_pass http://bookworm_web;
        limit_req off;
    }
}
